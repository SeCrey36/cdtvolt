{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Образовательная платформа{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --success-color: #4cc9f0;
        }
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding-top: 70px;
            margin: 0;
        }
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
        }
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .time-slot {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-slot:hover {
            border-color: var(--primary-color);
            background-color: #f8f9ff;
        }
        .time-slot.selected {
            border-color: var(--success-color);
            background-color: #e8f4f8;
        }
        .time-slot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #f8f9fa;
        }
        .alert-api {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            min-width: 300px;
        }
        /* Принудительное скрытие/показ навигации по классу на body */
        body.authed .guest-only { display: none !important; }
        body.authed .auth-only { display: block !important; }
        body.guest .auth-only { display: none !important; }
        body.guest .guest-only { display: flex !important; }
        .debug-info {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 9999;
    }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-mortarboard-fill me-2"></i>EduPlatform
            </a>

            <div class="flex-grow-1 d-flex align-items-center ms-3">
                <ul class="navbar-nav flex-row gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="/" data-i18n="nav.courses">Курсы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://t.me/s/secreyy36" target="_blank" data-i18n="nav.news">Новости</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <div class="btn-group" role="group" aria-label="Language switcher">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-lang="ru" onclick="setLang('ru')">RU</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-lang="en" onclick="setLang('en')">EN</button>
                </div>

                <div class="guest-only d-flex align-items-center gap-2">
                    <a href="/login/" class="btn btn-outline-primary" data-i18n="auth.login">Войти</a>
                    <a href="/register/" class="btn btn-primary" data-i18n="auth.register">Регистрация</a>
                </div>

                <div class="auth-only dropdown" style="display: none;">
                    <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person me-2"></i><span id="username-display" data-i18n="ui.loading">Настройки</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile/">
                            <i class="bi bi-person me-2"></i><span data-i18n="auth.profile">Профиль</span>
                        </a></li>
                        <li id="email-confirmation-item" style="display: none;">
                            <a class="dropdown-item text-warning" href="#" onclick="resendConfirmation()">
                                <i class="bi bi-envelope me-2"></i><span data-i18n="auth.confirm_email">Подтвердить email</span>
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()">
                            <i class="bi bi-box-arrow-right me-2"></i><span data-i18n="auth.logout">Выйти</span>
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

<div id="global-alert"></div>

    <!-- Основной контент -->
    <main class="container py-4" style="flex: 1 0 auto;">
        {% block content %}{% endblock %}
    </main>

    <!-- Футер -->
    <footer class="bg-dark text-white py-4" style="margin-top: auto;">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>EduHub</h5>
                </div>
                <div class="col-md-6 text-end">
                    <p>&copy; 2025 test</p>
                </div>
            </div>
        </div>
    </footer>

        function getLang() {
            const match = document.cookie.match(/lang=([a-z]{2})/);
            return match ? match[1] : 'ru';
        }

        function setLang(lang) {
            document.cookie = `lang=${lang};path=/;max-age=31536000`;
            applyI18n();
            document.documentElement.lang = lang;
        }

        function t(key) {
            const lang = getLang();
            return (I18N[lang] && I18N[lang][key]) || (I18N.ru[key] || key);
        }

        function applyI18n() {
            const lang = getLang();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const text = (I18N[lang] && I18N[lang][key]) || I18N.ru[key];
                if (!text) return;
                if (el.dataset.i18nTarget === 'placeholder') {
                    el.placeholder = text;
                } else {
                    el.textContent = text;
                }
            });
            document.querySelectorAll('[data-lang]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.documentElement.lang = lang;
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyI18n();
        });
    </script>
