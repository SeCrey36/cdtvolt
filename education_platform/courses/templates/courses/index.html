{% extends 'courses/base.html' %}

{% block title %}Курсы - Образовательная платформа{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="display-5 fw-bold mb-4" data-i18n="index.our_courses">Наши курсы</h1>
        <p class="lead text-muted" data-i18n="index.pick_course">Выберите курс, который соответствует вашим целям и интересам</p>
    </div>
</div>

<div class="row" id="courses-list">
    <!-- Курсы загружаются через JavaScript -->
    <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden" data-i18n="ui.loading">Загрузка...</span>
        </div>
        <p class="mt-2" data-i18n="index.loading_courses">Загружаем курсы...</p>
    </div>
</div>

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const courses = await getCourses();
            displayCourses(courses);
        } catch (error) {
            document.getElementById('courses-list').innerHTML = `
                <div class="col-12">
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span data-i18n="index.error_load">Не удалось загрузить курсы. Попробуйте позже.</span>
                    </div>
                </div>
            `;
        }
    });

    function displayCourses(courses) {
        const container = document.getElementById('courses-list');
        
        if (!courses || courses.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i>
                        <span data-i18n="index.no_courses">Пока нет доступных курсов</span>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = courses.map(course => `
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    ${course.image ? `
                        <img src="${course.image}" class="card-img-top" alt="${course.title}" style="height: 200px; object-fit: cover;">
                    ` : `
                        <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                            <i class="bi bi-book text-muted" style="font-size: 3rem;"></i>
                        </div>
                    `}
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${course.title}</h5>
                        <p class="card-text text-muted flex-grow-1">
                            ${course.description ? course.description.substring(0, 100) + '...' : t('index.no_description')}
                        </p>
                        <div class="mt-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span><i class="bi bi-clock"></i> ${course.duration_minutes} ${t('index.minutes')}</span>
                                <span class="badge bg-${course.is_active ? 'success' : 'secondary'}">
                                    ${course.is_active ? t('index.active') : t('index.inactive')}
                                </span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="h5 mb-0">${course.price} ₽</span>
                                <a href="/course/${course.id}/" class="btn btn-primary">
                                    ${t('index.more')} <i class="bi bi-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        applyI18n();
    }
</script>
{% endblock %}
{% endblock %}
