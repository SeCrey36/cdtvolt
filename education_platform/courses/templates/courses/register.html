{% extends 'courses/base.html' %}

{% block title %}Регистрация - Образовательная платформа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Регистрация</h4>
            </div>
            <div class="card-body">
                <form id="register-form">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Имя *</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Фамилия *</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя *</label>
                        <input type="text" class="form-control" name="username" required>
                        <div class="form-text">Будет использоваться для входа</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" class="form-control" name="phone" placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Пароль *</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Повторите пароль *</label>
                        <input type="password" class="form-control" name="password2" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Зарегистрироваться
                        </button>
                        <a href="/login/" class="btn btn-outline-secondary">
                            Уже есть аккаунт? Войти
                        </a>
                    </div>
                </form>
                
                <div id="register-result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        if (window.registerSubmitting) {
            console.warn('Регистрация уже отправляется, пропуск повтора');
            return;
        }
        window.registerSubmitting = true;
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        
        const button = this.querySelector('button[type="submit"]');
        button.disabled = true;
        button.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Регистрация...';
        
        try {
            const result = await apiRegister(data);
            
            document.getElementById('register-result').innerHTML = `
                <div class="alert alert-success">
                    <h5><i class="bi bi-check-circle"></i> Регистрация успешна!</h5>
                    <p class="mb-2">На ваш email отправлено письмо с подтверждением.</p>
                    <small class="text-muted">
                        Проверьте папку "Спам", если не видите письмо.<br>
                        Вы можете <a href="/login/" class="alert-link">войти в систему</a> после подтверждения email.
                    </small>
                </div>
            `;
            
            this.reset();
            
        } catch (error) {
            let errorMessage = 'Ошибка при регистрации';
            try {
                const errorData = JSON.parse(error.message);
                errorMessage = Object.values(errorData).join('<br>');
            } catch {}
            
            document.getElementById('register-result').innerHTML = `
                <div class="alert alert-danger">
                    <h5><i class="bi bi-exclamation-triangle"></i> Ошибка</h5>
                    <p class="mb-0">${errorMessage}</p>
                </div>
            `;
        } finally {
            button.disabled = false;
            button.textContent = 'Зарегистрироваться';
            window.registerSubmitting = false;
        }
    });
</script>
{% endblock %}
{% endblock %}
